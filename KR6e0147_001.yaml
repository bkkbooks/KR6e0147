body:
  text: 知歸學人彭際清述豫初習儒書執泥文字效昌黎韓氏語妄著論排佛然實未知佛之為佛果何如者也已而究生死之説瞿然有省始知回向心地從宋明諸先輩論學書窺尋端緒稍稍識孔顏學脈而于明道象山陽明梁溪四先生尤服膺弗失以四先生深造之旨證之佛氏往往而合然四先生中獨陽明王氏無顯然排佛語而明道象山梁溪所論著入主出奴時或不免豈世出世間其為道固不可得而同與抑法海無邊罕能盡其原底與豫畜疑久之纍數年而後決蓮華經云十方佛土中唯有一乘法無二亦無三除佛方便説但以假名字引道于衆生豫讀孔氏書得其密意以易繫無方中庸無倚之旨遊于華嚴藏海世出世間圓融無礙始知此土聖人多是大權菩薩方便示現乃以名字不同橫生異見鬬爭無已不亦大可悲乎既自信于中又懼天下萬世之疑不能直決也因疏暢其説以解諸儒之惑以究竟一乘之旨自四先生外有顯然排佛者并附論之程子曰佛學只是以生死恐動人聖賢以生死為本分事無可懼故不論生死知歸子曰朝聞道夕死可矣然則未聞道而死其可不謂之虗生乎夫虗生者聖人之所甚懼也是故學易而假年發憤而忘老其為性命之憂豈不大哉佛言生死事大正欲䇿人聞道耳何嘗怖死哉故曰不生不滅名一往來而實無往來只作尋常本分事説也程子曰傳燈録諸人如有達者臨死時決定當尋一尺布裹頭而死必不肯削髮胡服而終也知歸子曰法法不相知法法不相到法法空寂法法平等如以一尺布為實法則世間以尺布裹頭而死者其皆得謂之聞道邪古之人固有斷髮文身而稱中權者又何説也不知實際理地不受一塵四大本空尺布何有若論佛事門中竿木隨身逢場作戲其為尺布也多矣即安得以我之所餘傲彼之不足也程子曰佛氏之術其為忠孝仁義皆以為不得已直欲和者些秉彝都消殺得盡然後可以為道然而畢竟消殺不得如人之有耳目口鼻則須有此識人之有喜怒哀樂亦其性之自然今必盡絶為得天真是喪天真也知歸子曰此殆非佛氏之言也佛言以無我無人無衆生無壽者修一切善法即得阿耨多羅三藐三菩提清淨海中本無一法而不舍一法忠孝仁義感而遂通如谷響應聲來無所從去無所至又孰為不得已哉必以消殺秉彚為佛罪則未知夫世之能報親恩者固未有如佛者也天佛者非他覺圓滿而已矣覺圓滿故所有一切衆生之類若胎生若卵生若溼生若化生若有色若無色若有想若無想若非有想若非無想我皆令入無餘涅槃而滅度之如是滅度無量無數無邊衆生實無衆生得滅度者是之謂窮盡生之流窮盡生之流者舉十方世界之為人子者而胥覺之矣是之謂究竟生之原究竟生之原者舉十方世界之為人父為人母者而胥覺之矣孝莫大焉慈莫加焉姑以其迹言之淨飯王之生也得無生忍其歾也生淨居天而摩邪夫人亦且升天宮坐道場為善財童子説菩薩大願智幻解脫門使佛不離王宮正位金輪其榮施所生亦不過受宗廟之享保子孫之祚而已其遂能斷生死苦輪乎哉耳目口舌之欲喜怒哀樂之情苟逐于物皆私意也絶之可也不斷淫怒癡亦不與俱絶無所絶是名如來隨順覺性其得為喪天真乎是故聖之為聖在于意必固我既亡之後復于喜怒哀樂未發之先亦若是而已矣程子曰今語道則須待要寂滅湛靜形如稿木心如死灰所貴乎智周天地萬物而不遺又幾時要如死灰所貴動容周旋中禮又幾時要如稿木知歸子曰吾讀華嚴經時識得此意曹溪亦云第一莫著空程子曰佛以所賤輕施于人自己不為君臣父子夫婦之道而容人為之若以率人是絶類也知歸子曰有漏國土妄想所成聖人因幻起幻即幻歸真物各付物原自一𮈔不挂一毫不著堯舜事業如太山上一點浮雲過目程子亦言之矣佛方欲普度四生入無餘涅槃又何嘗以所賤施人使人盡從佛教同入泥洹不難轉五濁成淨土是則九品蓮臺不離當處永辭胎獄成就莊嚴何憂絶類邪如謂胎生是實化生為妄不知混沌初開始生之人何胎所出蝨生于肌螢生于草濁者既爾淨亦宜然微者既爾巨亦宜然程子曰釋氏只到止處無用處無禮義又曰釋氏子敬以直內則有之義以方外則未之有也故滯固者入于枯稿疏通者歸于放肆此佛之教所以為隘也又曰釋氏説道譬如以管窺天只務直上去唯見一偏不見四旁故不能處事又曰釋氏唯務上達而無下學然則其上達處豈有是也孟子曰盡其心者知其性也彼所謂識心見性是也若存心養性則無之矣知歸子曰程子此語以譏定性聲聞及豁達狂禪則諾真見心者體用一如渾無內外有內有外則有所住矣無所住而生其心故寂而常照用而常寂初未嘗專內而遺外也嚴淨毗尼勤行六度不盡有為不住無為初未嘗語上而遺下也達磨西來九年面壁趙州除二時粥飯外無雜用心長養護持其勤若此謂一知而遂己乎佛為二乘弟子説沙彌戒比丘戒為在家二衆説五戒八關齋戒為大乘弟子説菩薩戒或寬或嚴或詳或略大要使人因其所居之位曲為之防止惡而進善識心達本解無為法只務直上豈不信然然亦何偏之有乃其示現入山示行苦行既成道已偕諸梵侶蘭若安居遠離喧憒誠以大火宅中五欲所纏八風所鼓種種退緣無時暫息一入此門絶無礙聞法得果直至泥洹是為入道最勝方便故曰百工居肆以成其事君子學以致其道其不以此哉至教相所垂又往往與儒言相表裏梵網經言孝名為戒修淨業者以孝養父母為第一福田而以臣欺君子欺父為大惡其他概可推矣或謂由佛之説一切法空則忠孝皆為贅設不知夫忠孝者吾固有之心非作而致之也解一切法空無以後起者汩之則忠孝亦行所無事而已而又何贅焉如不解一切法空則忠孝翻成繫縛何則殉于名激于氣牽于情與清淨心不相應故然則由佛之道師其心勿泥其迹豈獨不戾乎名教抑深有助焉異同之論不可已乎程子論地獄曰至誠貫天地人尚有不化焉有立偽教而人可化乎又曰釋氏之説其歸欺詐始以世界為幻妄而謂有天宮後亦以天為妄卒歸之無知歸子曰以地獄天宮為偽教者將謂六經所弗道邪夫六經之嚴鬼神炳如矣有情焉有狀焉有言語詔告焉皇矣上帝臨下有赫其于人也或命之或顧之或憎且怒之福極之數有主之者矣紫微帝庭太乙所部懸象著明昭昭在上矣非天宮之證邪文王陟降在帝左右其生天之謂矣周公請代武王曰豫仁若考能多才多藝能事鬼神使死而無知公之言其欺誕矣乎至如鯀之為熊彭生之為豕伯有渾良父之為厲緣業所感因果無差是決不可得而泯滅者也于地獄又何疑焉夫三界罪福都由心造如鏡取影妍醜在人鏡體本虗影何可得楞嚴經明七趣輪轉妄想受生妄想隨業于妙圓明無作本心都無所著是故了心則即幻恆真迷本則全真是幻佛説是有有本不有佛説是無無即非無坐斷有無方明中道豈邊見之所能測乎伊川程子曰釋氏要屏事不問者事合有邪合無邪若是合有又安可屏若是合無自然無了更屏什麼又曰學佛者都要忘是非是非安可忘得自有許多道理何事忘為人只為物所役便苦事多若物各付物便役物也知歸子曰屏事之説蓋為初機學人未獲本明多諸障礙故令暫息塵勞回光自照所謂制心一處無事不辦是為入道方便而非究竟地也程子亦嘗教人靜坐矣不有類于屏事者邪若真見心者不如此舍利弗宴坐林中維摩詰語之言夫宴坐者不于三界現身意是為宴坐不起滅定而現諸威儀是為宴坐不舍道法而現凡夫事是為宴坐心不住內亦不在外是為宴坐于諸見不動而修行三十七品是為宴坐不斷煩惱而入涅槃是為宴坐若能如是坐者佛所印可大鑒亦言若欲成就種智須達一相三昧一行三昧于一切處而不住相于彼相中不生憎愛亦無取舍不念利益成壞等事安間恬靜虗融憺怕此名一相三昧若于一切處行住坐臥純一直心不動道場真成淨土是名一行三昧具二三昧復有何事而可屏邪至如一切是非當體空寂忘則成頑執亦是病唯一直心圓融法界不起分別成就莊嚴物各付物其在斯乎詩云不識不知順帝之則又曰奏假無言時靡有爭何是非之可執亦安用忘為哉程子曰聖人本天釋氏本心知歸子曰後天而奉天時是之謂本天先天而天弗違又將安本邪乾知大始亦本心而已矣程子曰若謂既反之氣復將為方伸之氣則殊與天地不相似天地之化自然生生不窮如鼻息然不必假吸以為呼氣又曰遊魂為變既是變則存者亡堅者腐更無物也知歸子曰盈天地間一靈而已矣氣不足以盡之靈乘氣而有生猶龍乘雲而為雨雲有起滅而龍自若也氣有聚散而靈自若也是故幽有鬼神明有聖人宰制陰陽役使羣動氣為之邪抑靈為之邪其必曰靈為之矣靈為之是決不可得而散滅者也如日月然今日之日即前日之日今月之月即前月之月如可得而散滅則天地之化或幾乎息矣且不獨人爾飛走之走蠢動之族莫不柄靈以生既柄靈以生即皆不可得而散滅者也然則善惡之報升沈之果其理自然又何疑焉程子論佛戒殺生之説曰儒者有兩説一説天生禽獸本為人食此説不是豈有人為蟣蝨而生邪一説禽獸待人而生殺之則不仁此説亦不然大抵力能勝之者皆可食但君子有不忍之心爾先兄嘗見一蠍不忍殺放去頌中二句曰殺之則傷仁放之則害義知歸子曰誠知天生禽獸不為人食則當體天之心為心與之並育而不害可矣而曰力能勝之者皆可食推是説也苟可充庖物無遺類矣不忍之心安在邪且伯子所謂仁義者抑何其抵捂邪仁人心也行而宜之之謂義以生為仁以殺為義大不可也蠍無可殺之罪放之宜矣殺之豈獨傷仁又且害義而程子弗加察焉嗚呼吾懼夫世之託于義以果其殺者皆自程子斯言為之鵠也萬物一體之學荒而仁義之塗塞可不痛哉張子曰知虗空即氣則有無隱顯神化性命通一無二若謂萬象為太虗中所見之物則物與虗不相資形自形性自性形性天人不相待而有陷于浮屠以山河大地為見病之説此道不明正由懵者略知體虗空為性不知本天道為用反以人見之小因緣天地明有不盡則誣世界乾坤為幻化幽明不能舉其要遂躐等妄意而然知歸子曰佛在楞嚴會上為諸弟子説一切衆生二種根本一者無始生死根本則汝今者與諸衆生用攀緣心為自性者二者無始菩提涅槃元清淨體則汝今者識精元明能生諸緣緣所遺者由諸衆生遺此本明雖終日行而不自覺枉入諸趣不知色身外洎山河虗空大地咸是妙明真心中物譬之澄清百千大海棄之唯認一浮漚體目為全潮窮盡溟渤汝等即是迷中倍人後文所言山河國土皆是無始見病所成正由迷失本心為物所轉攀緣前境都成見眚其與張子所譏以萬象為太虗中所見之物初無二指故云若能轉物則同如來身心圓明不動道場于一毛端遍能含受十方國土是則山河大地即妄全真形性天人通一無二恆沙性德當念周圓幽明之故神化之理斷可識矣不應割裂全文乖違本意張子曰釋氏語大語小流遁失中其過于大也塵芥六合其蔽于小也夢幻人世謂之窮理可乎不知窮理而謂之盡性可乎塵芥六合謂天地為有窮也夢幻人世明不能究所從也知歸子曰形而上者謂之道形而下者為之器天地一器耳器有分際即有成壞洛下之所營大章之所步邵堯夫之所推具此矣夫孰為無窮者其形而上者乎性形而上者也知性之無窮即欲不塵芥六合夢幻人世得乎故曰登東山而小魯登泰山而小天下張子所譏亦昧于道器之分矣語其至則道即器器即道本無大小安有成壞是故于一毫端現寶王剎坐微塵裏轉大法輪衆生見劫盡大火所燒時我此土安隱天人常充滿非盡性者其孰能與于斯朱子曰宇宙之間一理而已天得之而為天地得之而為地張之為三綱紀之為五常此理無適而不在儒者于此因其自然之理而成自然之功若夫釋氏惡此理之充塞無間而使己不得一席無理之地以自安猒此理之流行不息而使己不得一息無理之時以自快是以畔君親棄妻子入山林捐軀命求其所謂空無寂滅之地而逃焉知歸子曰吾于前文絶類之譏消殺秉彝之説已略剖其疑而未盡也華嚴四法界曰理法界曰事法界曰理事無礙法界曰事事無礙法界此四法界豎窮三際橫亘十虗誠所謂充塞無間流行不息者矣凡夫計有深怖法空不知法本自空無可怖故聲聞滯寂樂離生死不知遍界為身無可離故皆緣不識本來自性橫生諸見乖隔真如若入華嚴廣大圓融無礙之門順一切法空起大智願潤物利生世出世間重重涉入隱現隨緣都無作者法爾如然絶諸思議是故毗盧遮那遍一切處其現比丘身而説法者特釋迦應化之一隅耳入法界品善財童子遍參知識或現人王身而為説法或現長者居士身而為説法是之謂無礙然則謂義皇堯舜周文為千百億化身中之一身可也所謂現人王身而説法也謂孔子為千百億化身中之一身可也所謂現長者居士身而説法也張三綱紀五常範圍天地曲成萬物胥大千而經綸之曾不滿普賢一毛孔中億萬分之一何則理無盡事亦無盡事無盡行亦無盡唯其無盡是以無礙何厭之有何惡之有朱子之論觀心也曰心者人之所以主乎身者也以之觀物則物之理得今復有物以反觀乎心則此心心外復有一心而能管乎此心也是以心求心以心使心如口齕口如目視目也知歸子曰謂以心觀物者是外心以求物也謂以物觀心者是外物以求心也心無內外故物無內外物無內外故觀無內外然則以心求心可也如空合空而已矣以心使心亦可也如身使臂而已矣古德不云乎觀是何人心是何物朱子答連嵩卿云所謂天地之性即我之性豈有死而遽亡之理不知為此説者以天地為主邪以我為主邪若以天地為主則此性即是天地間一箇公共的道理雖曰死而不亡然非有我之得私矣若以我為主則只是于自己身上認得一箇精神魂魄有知有覺之物即便目為己性把持作弄到死不肯放舍謂之死而不亡是乃私意之尤者尚何足與語死生之説性命之理哉若果如此則是一箇天地性中別有若干人物之性每性各有界限不相交雜自生自死更不由天地陰陽造化而為天地陰陽者亦無所施其造化矣豈有此理乎知歸子曰以天地為主不由乎我是謂斷見不知既已無我誰名天地誰為不亡以我為主不由天地是謂常見不知見有我者即生死根性真常中無彼我故由前之見世間聖人初無是説論語曰未知生焉知死是謂生死無二理也曰未能事人焉能事鬼是謂人鬼無異情也其不得以斷見測之明矣由後之見出世間聖人亦無是説圓覺經云有我愛者亦愛涅槃伏我愛根名涅槃相有憎我者亦憎生死不知愛者真生死故別憎生死名不解脫其不得以常見求之決矣二見坐斷生滅平等去來一如是則名為真解脫者豈把持作弄不肯放舍之謂哉至人物之性雖同出一原而其流各別如月印千川川各一月清濁既隔明暗迥殊豈以一月既同遂謂千川無別雖則川川有別何礙一月之同其生既爾死復何疑陰陽造化神感神應亦物各付物而已初何嘗有意其間哉朱子云佛氏磨擦得者心極精細如一塊物事剝了一重皮又剝一重皮至剝得極盡無可剝處磨弄得者心精光他便認做性殊不知此正聖人之所謂心佛氏原不曾識得者理便認知覺運動為性如視聽言貌聖人則視有視之理聽有聽之理言有言之理動有動之理思有思之理所謂明聰從恭睿是也佛氏則只認那能視能聽能言能思能動的便是性橫來豎來他都認做性最怕人説者理字都要除掉了此正告子生之謂性之説也知歸子曰視聽言貌不外一心一心之精斯之謂睿誠如所謂剝了一重又剝一重剝得盡時天明斯復天明既復天則自呈視聽貌言從此流出自然明聰恭從不過其則豈非作聖之功乎若離此一心別有視聽言貌之理一以貫之其謂之何祖師偈云在眼曰見在耳曰聞在鼻嗅香在口談論在手執捉在足運奔遍現具該法界收攝在一微塵識者知是佛性不識喚作精魂偈指正謂但了一心更無餘法識字儘有工夫正如儒家識仁之指用力既久豁露本明湛寂真常遍周沙界是謂識心亦名見性一日克己復禮天下歸仁焉其斯之謂矣至心性二字本無定指儒家所説已自不同孟子曰仁人心也或言本心或言良心何嘗專以知覺運動為心邪子曰性相近也孟子道性善必徵之于情何嘗離心以言性邪佛氏言心有真心有妄心言性有遍計自性依他自性圓成自性又何嘗但以知覺運動為性邪要之心性總是強名為度羣迷曲施方便如其達本忘情尚不見有能證之人所證之法豈可橫生意見妄説是非若夫佛事門中須憑建立是故五戒之目全體五常十善之條全包五事安有外此理以為教者哉至宗門掃蕩之談如大黃附子祇求去病瞑眩何傷過誤殺人初非藥咎安得以末流之弊罪立教之人乎朱子曰釋氏只四十二章是古書餘皆中國文士潤色成之維摩經亦南北時人作又曰達摩未來中國時如遠肇法師之徒只是説老莊後來人亦多以老莊助禪西域豈有韻諸祖相傳偈平仄協韻皆是後人為之又曰圓覺經只有三段好後面只是強添楞嚴經本只是呪語後來房融添入許多道理説話呪語想亦淺近但其徒恐譯出則人易之故不譯又曰佛只是説大話謾人法華經開口便説恆河沙幾萬劫幾千劫更無近的年代知歸子曰天竺只有梵書入此土時必假法師翻譯其法師必華梵兼通乃能用此間文句演暢佛指偈語協韻亦復何疑維摩法華是鳩摩羅什譯圓覺是佛陀多羅譯楞嚴是般剌蜜帝譯當時文士不通梵書安知佛指而潤色成之邪唯楞嚴為房融筆授筆授云者不過書寫校讐之謂非能有所增益也使經果出融手何乃諱自譯之名而必假梵僧以為重至呪係密語但取其音不取其義諸經所同謂以淺近故不翻豈其然也佛經之指與老莊自別老子云道法自然佛則云精覺妙明非因非緣亦非自然非不自然無非不非無是非是老子云惚兮恍兮其中有象恍兮惚兮其中有物佛則云縱滅一切見聞覺知內守幽間猶為法塵分別影事朱子亦言老氏尚理會自家一箇身釋氏渾身都不管莊子絶滅不盡佛絶滅盡夫老氏謂外其身而身存後其身而身先猶未能遺身也佛則了陰非我即身無身即身無身是名大身是名遍法界身絶滅盡者非稿木死灰之謂三界惑盡萬德周圓常寂光中有何賸法是尚非十地菩薩所能究竟何況聲聞及諸外道而謂南北時人智反出老莊上邪法華云是法非思量分別之所能解時劫長短情量所生情量既盡長短一如故曰我觀久遠猶若今日稱性之談豈為謾語圓覺楞嚴初示自性真空後顯修行軌則頓漸并收初中後善是為如來決定境界是為十方諸佛一門超出妙莊嚴路奈何挾輕慢心妄加詆毀乎哉陸子之判儒釋曰義利曰公私唯義唯公故經世唯利唯私故出世儒者雖至于無聲無臭無方無體皆主于經世釋氏雖盡未來際而普度之皆主于出世知歸子曰否否儒固未嘗經世佛又未嘗出世也夫所謂世出世間者特分別心所見耳古之大人所過者化所存者神有天下而弗與雖德被四海功在萬世初未嘗見有天下也如必斤斤焉以經世為心則是有天下而與焉也是自私者也是用智者也其為方體也大矣其為聲臭也章矣不足以語于羲皇堯舜周文之心也決矣佛所謂出世間者謂出三有世間也出五蘊世間也切而言之則世間云者一生滅心而已矣易所謂憧憧往來朋從爾思是也生滅情盡則出世間矣即生滅心悟真常心艮其背不獲其身行其庭不見其人此之謂也即生滅心悟平等心天下同歸而殊塗一致而百慮天下何思何慮此之謂也未至于此則所謂經世者特歡虞小補云耳所謂出世者特聲聞小乘云爾其為私與利也豈不大哉陸子曰釋氏雖出家亦上報四恩日用之間此理之根于心而不可泯滅者彼固或存之也然其為教非為存此而起也故其存不存不足為深造其道者輕重若吾儒則曰人之所以異于禽獸者幾希庶民去之君子存之釋氏之所憐憫者為未出輪回生死相續謂之生死海裏浮沈若吾儒中聖賢豈皆只在他生死海裏浮沈也彼之所憐憫者吾之聖賢無有也然其教不為欲免此而起故其説不主此也知歸子曰一切萬法莫不從自心中而建立其要在知本但得本莫愁末故曰溥博淵泉而時出之中庸一書以天命開宗以無聲無臭為歸宿其論學有生知學知困知之別有安行利行勉行之差而同歸于一一者何本之謂也知也者知此者也行也者達此者也知本則明達本則誠誠且明一天道之不已而已矣存不足以言之由是施之人倫推之庶物不疑其所行故不習無不利篤恭而天下平實無一法可得故曰上天之載無聲無臭至矣陸子曰人而不盡人道則不足與天地並吾亦曰人而不達天道則安能先天而天弗違安能範圍天地曲成萬物誠得其本矣九流雜家百工衆藝莫不在吾範圍曲成之內何獨至于佛而外之有外之心不足以達天道不達天道而能出生死斷輪回無有是處敬齋胡子曰佛學只守向一路去更不去窮天下道理所以其學易成只守一箇念頭便要做成佛非若儒者智周萬物道濟天下而心常存也儒者心與理一而存佛學心與理離而存知歸子曰理無在無不在覺之而已矣常覺則理無不盡時措之而宜矣若以理為有在而以心守之是二之也儒者戒慎不覩恐懼不聞莫不歸根于獨聖人以此洗心退藏于密亦未有不從一念為之地者舍一念而求之萬如無根本如無原水欲不枯與涸也得乎是故孔子默而識之顏子如有所立孟子求放心周之主靜程之主敬延平默坐澄心體認天理皆此志也於此有覺是謂知本覺無所覺是謂達本離此求道盡為外道將心存理是謂失心胡子曰不愧屋漏雖無一事然萬理森然已具於中此是體也但未發耳老佛以為空無則本體已絶矣今人只言老佛有體無用吾謂正是其體先絶于內故無用于外也知歸子曰方廣外道立空無為宗佛教所斥楞伽經云寧取人見如須彌山不起無所有增上慢空見曹溪云世界虗空能含萬物色像日月星宿山河大地泉原溪澗草木叢林惡人善人惡法善法天堂地獄一切大海須彌諸山總在空中世人性空亦復如是心量廣大遍周法界用即了了分明應用便知一切一切即一一即一切去來自由心體無住名為般若是故普賢菩薩發十大願王而曰虗空界盡衆生界盡衆生業盡衆生煩惱盡我願乃盡其有體無用邪抑無體無用邪且其所謂森然已具者謂即空而具抑離空別有若離空別有則有在何處若即空而具又何惡于空哉但無取著空耳胡子曰儒者敬以存心其心體湛然在腔子裏如主人公在家便能整治家事是箇活主人釋氏默坐澄心屏去思慮久而至于空豁是無主人矣又有只是繫制其心使之存者便死殺了他做主不得此則禪之下者真空無心是禪之上者知歸子曰心其無方者也有腔子可求有湛然者可指則塊然一物而已非死殺而何真空無心亦未究竟古德云原來有心無心盡成謗彼以意見為有無何啻千里胡子曰釋氏見道如漢武帝見李夫人非真見者也釋氏只想像箇道理故勞而無功儒者便即事物上去窮究知歸子曰自格物之學不明而人之以放其心為學者多矣大學之言格物也前文云物有本末事有終始知所先後則近道矣是謂本先而末後也後文明本末之辨終之曰此謂知本此謂知之至也明以知本為知之至也本者何明德是也知本則知止格物之功莫要于此何嘗教人專求之事物邪楞嚴經云精研妙明觀察不停精研者儒言格致是觀察者儒言顧諟是宗門教人必先參究用力之久一旦豁然是名見性何嘗以想像為道邪胡子曰佛氏言死而歸真殊不知生有生之理不可謂無以死為歸真是以生為不真矣知歸子曰佛言因緣和合虗妄有生因緣別離虗妄名滅殊不能知生滅去來本如來藏常住妙明不動周圓妙真如性性真常中求于去來迷悟生死了無所得如是誠言撥雲見日何嘗于生滅法中強生取舍生寄死歸世俗恆語載稽梵册未之前聞或問佛氏説真性不生不滅其意如何胡子曰釋氏以知覺運動為心是氣之靈處故又要把持此物以免輪回愚故曰釋氏不識性妄指氣之靈者謂性知歸子曰不生不滅本體如然圓裹六虗更無他物知覺運動何莫非心本無所住安用把持若認氣為心便成繫縛是生死根何名真性涇陽顧子曰三藏十二部一言以蔽之曰無善無惡試閲七佛偈便自可見或曰永嘉證道歌謂棄有而著無如舍溺而投火恐佛氏未必以無為宗也曰此只就無善無惡四字翻弄到底非有別義也棄有以有為惡也著無以無為善也是猶有善有惡也無亦不著有亦不棄則無善無惡矣自此以往節節推去掃之又掃直掃得沒些子賸都是者箇意頭知歸子曰善惡者對待之名感于物而形焉者也淨智妙圓體自空寂不可以有無名況善惡哉孟子之言性也曰乃若其情則可以為善矣是言性之可以為善也程子曰人生而靜以上不容説才説性時便已不是性也以善惡名性皆程子所謂不是性也有棄有著逐物而已非性之本然也是故知性者不取一法而非有棄也不舍一法而非有著也掃之又掃掃得盡時二際坐斷圓滿覺心遍周沙界譬諸雲開則日現原濬則流長直下洞然更無餘法斯則一乘之了義實列聖之元詮若夫方便門中不廢對治以法身隨緣起諸染法必藉止觀熏修成其淨用是故行則要于漸滿惑則期于漸斷六度齊修萬善具足方能淨諸國土成熟有情經云理則頓悟乘悟併消事非頓除因次第盡識渠善惡本空何礙止惡行善不到至善之地誰證善惡本究善惡本空理則頓悟也止惡行善事非頓除也真消真盡真盡真消不住中塗直趨寶所如其執理而遺事或逐事而迷理詎可議于華嚴無礙之指哉顧子曰無聲無臭吾儒之所謂空也無善無惡二氏之所謂空也名似而實遠矣是故諱言空者以似廢真混言空者以似亂真豫皆不敢知也知歸子曰空一而已謂無聲無臭為有善有惡邪則不得謂之無聲無臭矣謂無善無惡為有聲有臭邪則不得謂之無善無惡矣蓋聲臭者善惡之萌善惡者聲臭之著將取善以別空亦猶取有而諱空也顧子之意豈不以有善無惡是謂真空無善無惡終歸莾蕩以此為儒佛鴻溝之判不知大易之文曰虗曰寂曰無方無體曰何思何慮善可得而有邪維摩經云雖知諸佛國及與衆生空而常修淨土教化于衆生華嚴經云此菩薩修習一切諸善根時作是念言願此善根功德之力至一切處譬如實際無處不至至一切物至一切世間行一切衆生至一切國土至一切法至一切虗空至一切三世至一切有為無為至一切語言音聲願此善根亦復如是善可得而無邪直須坐斷有無遠離空色一念未生萬善普會繁興大用當處寂然斯為究竟真空何至偏淪莾蕩若夫取善而窒空與取空而廢善執心未化戲論滋多不獨乖釋門三觀之宗亦豈識孔氏無言之教哉顧子一日遊觀音寺見男女載於道過往來續繩繩不已謂弟季時曰即此可以辨儒佛已凡所以為此一片禍福心耳未見有為禍福而求之吾聖人者也佛氏何嘗邀之使來吾聖人何嘗拒之使去佛氏何嘗專言禍福吾聖人何嘗諱言禍福就中體勘其間必有一段真精神迥然不同處季時曰此特愚夫愚婦之所為耳有識者必不其然曰感至于愚夫愚婦而後其為感也真應至于愚夫愚婦而後其為應也真真之為言純乎天而人不與焉者也知歸子曰嗟乎愚夫愚婦之心殆非徒禍福之所能動也夫近於人而能為禍福者莫如城隍里社之神矣然而城隍里社之神能動鄉邑之人而止矣其大者則江河海嶽之神出雲雨見怪物又其大者則日月星斗之神掌罪福主生死然而有司者報焉有求者禱焉能動方域之人而止耳若夫佛化之所及蓋寥廓而無終極矣豈禍福云爾哉誠謂證法性身盡無明本神感神應非我非渠故曰佛身充滿于法界普現一切衆生前隨緣赴感靡不周而恆處此菩提座感應至愚夫愚婦而其感應也始真豈不信哉且感應之理儒亦言之子曰一日克己復禮天下歸仁焉由周而來二千餘年自天子王侯中國言六藝者折中于夫子神感神應亦若是而已矣或問三世之説顧子曰域中有二大道大法大道者何綱常倫理是也所謂天敘有典天秩有禮根乎人心之自然而不容或己者也有如佛氏之説行則凡忠臣孝子皆為報夙生之恩而來凡亂臣賊子皆為報夙生之怨而來反諸人心之自然而不容或己處吾見了不相干也於是綱常倫理且茫焉無所繫屬而道窮矣大法者何黜陟豫奪是也所謂天命有德天討有罪發乎人心之當然而不容或爽者也有如佛氏之説行則凡君子而被戮辱皆其自作之孽而戮辱之者非為傷善凡小人而被顯榮皆其自貽之休而顯榮之者非為庇惡揆諸人心之當然而不容或爽處吾見了不相蒙也於是黜陟豫奪且貿焉無所憑依而法窮矣知歸子曰因緣法中果報各殊然佛之教人唯一心法三世本空因緣非有至如辟凶趨吉長善防非可畏者因難逃者果忠臣孝子知恩報恩即此莫之為而為便是不容己之處亂臣賊子以怨報怨即此不可解之結便在無可赦之條君子而被戮辱豈無戮辱之因然其戮辱之者自當獲傷善之報小人而被顯榮合有顯榮之福然在顯榮之者已難逃庇惡之誅是故君子之守行其素位而已王者之法明其常道而已三世之指不外一心因緣之理不離當處以為妨道妨法吾不知也顧子曰吾聖人以人倫為實際其所謂心性即在君臣父子兄弟夫婦之中佛氏以人倫為幻迹其所謂心性乃在君臣父子兄弟夫婦之外在君臣父子兄弟夫婦之中是謂體用一原顯微無間在君臣父子兄弟夫婦之外體用顯微打成兩截矣即口口説一原無間其能一原無間乎否也知歸子曰性無內外道無內外即君臣父子兄弟夫婦而道在焉非有所住也順應而已矣即君臣父子兄弟夫婦所不屬而道無不在焉非有所遺也默成而已矣是謂體用一原顯微無間必君臣父子兄弟夫婦而後可以為道則當夫人生而靜之初將以何者為道即今不覩不聞之頃將以何者為道推之一息不屬之時又將以何者為道然則原其始要其終反求諸現在而離道之時固已多矣其能一原無間否邪故曰道也者不可須臾離也可離非道也其亦識取不可離者而可矣梁溪高子曰聖人之學所以異于釋氏者只一性字聖人言性所以異于釋氏言性者只一理字理者天理也天理者天然自有之條理也故曰天敘天秩天命天討此處差不得針芒先聖後聖其揆一也此理在拈華一脈之上非窮理到至極處不易言也知歸子曰宋明諸儒為心性之辨者多矣大率岐性與心而二之者也為理氣之辨者多矣大率岐理與氣而二之者也大學言心不言性性即心也中庸言性不言心心即性也大易論理不論氣氣即理也孟子論氣即論道氣亦道也合而言之一心而已矣了心者一且不立二復何有其見為有二者皆不知心者也且高子所言窮理到極至處其可以知知可以識識邪可以知知可以識識則非天載之本然何名極至不可以知知不可以識識吾不知與拈華一脈有何分別卻成高下邪高子曰佛氏夷善惡是非而曰平等彼固曰無分別心有分別性我則謂有分別性亦無分別用使天下善惡是非顛倒錯亂舉一世糜爛之蠱壞之不顧其亦不仁而已矣知歸子曰日行于天上者若岡若岨下者若汙池若溷廁無弗照也水行于地細者若溝若渠大者若江淮若河海無弗入也日也水也有是非善惡于其間乎哉有是非善惡于其間則其明之息也久矣其流之壅也速矣大哉平等其天之所以為心乎天之于人也禍福升沈榮枯生死非有區之者而適如其自取焉亦平等而已矣不聞其舉一世而糜爛之蠱壞之也且夫佛之于是非善惡也嚴矣五戒十戒十重四十八輕戒二百五十戒五百戒極之三千威儀八萬細行胥四衆之人納之于清淨之域是故處世則為居士為長者為轉輪聖王出世則為聲聞為緣覺為菩薩未聞其舉一世而糜爛之蠱壞之也然則無分別心有分別用是則佛之所以為佛天之所以為天亦聖之所以為聖也其為仁也豈不大哉高子曰天地間對待之理有陽便有陰有吾儒便有二氏佛氏之教陰教也觀其生于西方譯自外國所言皆鬼神之事概可見矣自古陽分中極治之世何嘗有佛氏來陽極盛則陰生三代之時世界已屬陰分至孔子之時吾道大明其盛已極而佛老遂並生于其間逮後世運益下聖道益衰佛老司教各以其類也知歸子曰陰陽二義或名大小或喻善惡佛法非大小之可量非善惡之可擬何為陰教哉請得而究言之儒者之教以天命為宗以至善為體位之為天地育之為萬物一生生不已而已矣一至誠無息而已矣其機順故其用常主于經世老氏之教以無極為宗以希夷微為體損之又損以至于無為無為而無不為其機逆而順故其用在世出世間佛氏之教以一心為宗以盡虗空遍法界為體即色即空非空非色離四相出三有其機逆故其道常主于出世然而言天載者以無聲無臭為至則太極反乎無極矣吾有知乎哉無知也則超乎色空矣究竟本來涅槃生死俱不可得何順何逆非世間非出世間同一毗盧遮那妙莊嚴海嗚呼此非獨觀于昭曠之原者孰足以知其意哉至以西方外國為嫌則文王非西夷之人邪鬼神之説屢見于詩書又何謂也謂三代以還世界屬陰更非通論治亂循環陰陽迭運漢明帝唐太宗明太祖時視春秋孰治而佛教昌焉其果陰之所召邪或問知歸子曰子儒者也服習諸先生書舊矣今舍而之佛其不為背本乎答曰豫所言者天下之公言也非己之所得私也佛法行世久矣是苦海之津梁也是衆生之眼目也是帝天之所呵護神鬼之所欽崇也六師不能沮其化三武不能遏其流而諸先生顧欲以方隅之見辭而闢之亦勞而少功矣闢之者一以為偽教一以為異端以為異端是法執未忘也以為偽教是天眼未通也諸先生之在今日決定法執忘天眼通矣是豫之所言皆諸先生所欲言也又何間焉且諸先生所造誠未易測矣高子之入道也閲程伯子語云萬變皆在人其實無一事當念斬然曰其實原無一事也至末後與人書曰心如太虗本無生死抑何其言之似佛也豈唯高子哉陸子之言曰不識不知順帝之則此理豈容識知哉吾有知乎哉此理豈容有知哉朱子曰非全放下終難湊泊是亦佛説也明道云與其非外而是內不若內外之兩忘兩忘則澄然無事矣伊川之將終也曰道著用便不是其果能自異於佛否邪特其平生志事唯在扶皇極敘人倫故于佛氏之指誠不暇深究又以先入者為之主遂流于武斷而不自知然而此心理之同誠不容有二故其深造自得處亦不能自掩豈唯諸子哉舜之無為文之不顯孔子之無知亦若是而已矣同此之謂大道異此之謂異端不由乎此而徇生執有妄希至道譬之回旋于斷港絶潢中而蘄至于海不可得也此論作于重光赤奮若之冬閲今十一年矣初脫稿時汪子大紳評為決定説又謂不獨佛氏之圓宗亦儒門之了義而刪去戒殺生一節及論老莊一節其意在和同三教不欲有所軒輊于其間又刪去末後兩節一則謂法法無根才費分疏已成死句一則謂心言直故無諸委曲直收直放一往快然其言亦各有指然戒殺一事乃儒佛共由之路豈得謂佛好生而儒好殺邪誠好生又豈得以生為仁以殺為義以殺為義則義乃仁之賊矣而豈然哉老莊之書具在與圓覺楞嚴子細較量同異自見實際理也一尚不立何有于三然建化門頭不無差別如四時之錯行如日月之代明分劑畫然要不礙大虗之體最後論諸先生所證真實不虗並無委曲此論不明則諸先生亦六師三武之流耳又何能模範人倫興起百世哉故仍依原本而附著其説如此乾隆五十六年九月晦際清題題一乘決疑論後大哉毗盧海遍滿一切處于一毛端中世界無量數一一世界中分身而普度日月何以明寒暑何以互陰陽誰均調經常誰布濩善善與惡惡感應何無誤此皆毗盧海不可思議故起居粥飯間莊嚴性海具愚者昧其原畫疆爭負固反執儒家言與佛相觸忤不知古聖賢深達菩提路或佛親化身或受佛屬付隨順衆生心欣戚與好惡四維張綱常庶類別舉措因宜而制法方便為營護去聖忽時遙羣言並抵捂如蝨處褲中妄測朝與莫少讀孟子書疑情每迸露善信美大聖神是誰人做分明六種人頗訝考亭注始知三界雄別有大徹悟法身證虗空無去亦無住化城難久居寶山須進步叔父少年時洙泗曾沿沂因流達其原河漢在吞吐己覺復覺他具見婆心苦憫茲執迷人張目而一呼小子復何知屢次蒙開諭敢輸涓滴流為彼汪洋助奉告讀書人莫復障雲霧
